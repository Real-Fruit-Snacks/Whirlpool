<svg xmlns="http://www.w3.org/2000/svg" width="800" height="280" viewBox="0 0 800 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11111b"/>
      <stop offset="50%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#181825"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#94e2d5"/>
      <stop offset="50%" style="stop-color:#a6e3a1"/>
      <stop offset="100%" style="stop-color:#94e2d5"/>
    </linearGradient>
    <linearGradient id="spiral-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#94e2d5"/>
      <stop offset="100%" style="stop-color:#a6e3a1"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#94e2d5;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#94e2d5"/>
      <stop offset="50%" style="stop-color:#a6e3a1"/>
      <stop offset="80%" style="stop-color:#94e2d5"/>
      <stop offset="100%" style="stop-color:#94e2d5;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="logo-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" rx="12" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect width="800" height="280" rx="12" fill="none" stroke="#45475a" stroke-width="1"/>

  <!-- Decorative spiral motif (top-right) -->
  <g opacity="0.06" transform="translate(680, 90)">
    <path d="
      M 0,-50
      A 50,50 0 0,1 50,0
      A 50,50 0 0,1 0,50
      A 50,50 0 0,1 -50,0
      A 50,50 0 0,1 0,-40
      A 40,40 0 0,1 40,0
      A 40,40 0 0,1 0,40
      A 40,40 0 0,1 -40,0
      A 40,40 0 0,1 0,-30
      A 30,30 0 0,1 30,0
      A 30,30 0 0,1 0,30
      A 30,30 0 0,1 -30,0
      A 30,30 0 0,1 0,-20
      A 20,20 0 0,1 20,0
    " fill="none" stroke="#94e2d5" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="20" y2="-40" stroke="#a6e3a1" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="20,-48 15,-38 25,-38" fill="#a6e3a1"/>
  </g>

  <!-- Decorative spiral motif (bottom-left) -->
  <g opacity="0.04" transform="translate(100, 220)">
    <path d="
      M 0,-35
      A 35,35 0 0,1 35,0
      A 35,35 0 0,1 0,35
      A 35,35 0 0,1 -35,0
      A 35,35 0 0,1 0,-25
      A 25,25 0 0,1 25,0
      A 25,25 0 0,1 0,25
      A 25,25 0 0,1 -25,0
      A 25,25 0 0,1 0,-15
      A 15,15 0 0,1 15,0
    " fill="none" stroke="#a6e3a1" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Decorative dots (enumeration data points) -->
  <g opacity="0.08">
    <circle cx="60" cy="45" r="1.5" fill="#94e2d5"/>
    <circle cx="80" cy="40" r="1" fill="#a6e3a1"/>
    <circle cx="100" cy="50" r="1.5" fill="#94e2d5"/>
    <circle cx="75" cy="60" r="1" fill="#a6e3a1"/>
    <circle cx="95" cy="33" r="1" fill="#94e2d5"/>
    <circle cx="115" cy="43" r="1.5" fill="#a6e3a1"/>
    <circle cx="40" cy="53" r="1" fill="#94e2d5"/>
    <circle cx="120" cy="57" r="1" fill="#a6e3a1"/>
    <circle cx="50" cy="35" r="1.5" fill="#94e2d5"/>
    <circle cx="130" cy="37" r="1" fill="#a6e3a1"/>
    <circle cx="710" cy="215" r="1.5" fill="#94e2d5"/>
    <circle cx="690" cy="225" r="1" fill="#a6e3a1"/>
    <circle cx="730" cy="230" r="1.5" fill="#94e2d5"/>
    <circle cx="705" cy="240" r="1" fill="#a6e3a1"/>
    <circle cx="675" cy="220" r="1" fill="#94e2d5"/>
    <circle cx="740" cy="220" r="1" fill="#a6e3a1"/>
  </g>

  <!-- Inline Spiral Escape logomark (left of title) -->
  <g transform="translate(185, 88)" filter="url(#logo-glow)">
    <path d="
      M 0,-22
      A 22,22 0 0,1 22,0
      A 22,22 0 0,1 0,22
      A 22,22 0 0,1 -22,0
      A 22,22 0 0,1 0,-16
      A 16,16 0 0,1 16,0
      A 16,16 0 0,1 0,16
      A 16,16 0 0,1 -16,0
      A 16,16 0 0,1 0,-10
      A 10,10 0 0,1 10,0
      A 10,10 0 0,1 0,10
      A 10,10 0 0,1 -10,0
      A 10,10 0 0,1 0,-5
      A 5,5 0 0,1 5,0
    " fill="none" stroke="url(#spiral-grad)" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
    <!-- Center dot -->
    <circle cx="2" cy="0" r="3" fill="#94e2d5"/>
    <!-- Escape arrow -->
    <line x1="2" y1="0" x2="12" y2="-20" stroke="#a6e3a1" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="12,-26 8,-18 16,-18" fill="#a6e3a1"/>
    <!-- Data dots -->
    <circle cx="16" cy="14" r="1.5" fill="#94e2d5" opacity="0.6"/>
    <circle cx="-18" cy="-8" r="1.5" fill="#a6e3a1" opacity="0.5"/>
    <circle cx="8" cy="20" r="1" fill="#94e2d5" opacity="0.5"/>
  </g>

  <!-- Title -->
  <text x="430" y="130" font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',Consolas,monospace"
        font-size="62" font-weight="bold" fill="url(#title-grad)" text-anchor="middle"
        letter-spacing="8" filter="url(#glow)">WHIRLPOOL</text>

  <!-- Accent line under title -->
  <rect x="200" y="148" width="460" height="2" rx="1" fill="url(#accent-line)"/>

  <!-- Subtitle -->
  <text x="430" y="178" font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',Consolas,monospace"
        font-size="13" fill="#a6adc8" text-anchor="middle"
        letter-spacing="4">PRIVESC REASONING ENGINE</text>

  <!-- Tech badges -->
  <text x="430" y="202" font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',Consolas,monospace"
        font-size="10" fill="#6c7086" text-anchor="middle"
        letter-spacing="3">PYTHON · LINPEAS · WINPEAS · PLAYBOOKS</text>

  <!-- Feature badges -->
  <g transform="translate(110, 220)">
    <!-- offline analysis -->
    <rect x="0" y="0" width="140" height="28" rx="14" fill="#313244"/>
    <rect x="0" y="0" width="140" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="18" cy="14" r="4" fill="#a6e3a1"/>
    <text x="30" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">offline analysis</text>

    <!-- score ranking -->
    <rect x="160" y="0" width="130" height="28" rx="14" fill="#313244"/>
    <rect x="160" y="0" width="130" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="178" cy="14" r="4" fill="#94e2d5"/>
    <text x="190" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">score ranking</text>

    <!-- attack chains -->
    <rect x="310" y="0" width="130" height="28" rx="14" fill="#313244"/>
    <rect x="310" y="0" width="130" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="328" cy="14" r="4" fill="#f38ba8"/>
    <text x="340" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">attack chains</text>

    <!-- multi-format -->
    <rect x="460" y="0" width="130" height="28" rx="14" fill="#313244"/>
    <rect x="460" y="0" width="130" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="478" cy="14" r="4" fill="#a6e3a1"/>
    <text x="490" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">multi-format</text>
  </g>
</svg>
