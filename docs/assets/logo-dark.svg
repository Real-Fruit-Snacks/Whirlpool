<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#94e2d5"/>
      <stop offset="100%" stop-color="#a6e3a1"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#94e2d5"/>
      <stop offset="100%" stop-color="#a6e3a1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="220" fill="#11111b" rx="8"/>

  <!-- Hexagonal Frame -->
  <g transform="translate(100, 110)" filter="url(#softGlow)">
    <polygon points="0,-72 62.4,-36 62.4,36 0,72 -62.4,36 -62.4,-36"
             fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.4"/>

    <!-- Center node -->
    <circle cx="0" cy="0" r="2" fill="#94e2d5" opacity="0.6"/>
    <!-- Entry node (left) -->
    <circle cx="-62.4" cy="0" r="2" fill="#94e2d5" opacity="0.5"/>
    <!-- Exit node (right) -->
    <circle cx="62.4" cy="0" r="2" fill="#94e2d5" opacity="0.5"/>

    <!-- Particle dots on hex edges -->
    <circle cx="31.2" cy="-54" r="1.2" fill="#a6e3a1" opacity="0.35"/>
    <circle cx="-31.2" cy="-54" r="1.2" fill="#94e2d5" opacity="0.3"/>
    <circle cx="31.2" cy="54" r="1.2" fill="#a6e3a1" opacity="0.3"/>
    <circle cx="-31.2" cy="54" r="1.2" fill="#94e2d5" opacity="0.35"/>
    <circle cx="-55" cy="-18" r="1" fill="#a6e3a1" opacity="0.25"/>
    <circle cx="55" cy="18" r="1" fill="#94e2d5" opacity="0.25"/>

    <!-- LOGOMARK: Spiral Escape -->
    <!-- Spiral winding inward — 3 arcs forming the spiral -->
    <!-- Outer arc (bottom-right to top-left) -->
    <path d="M 30,8 A 28,28 0 0,0 -26,4" fill="none" stroke="#94e2d5" stroke-width="1.3" stroke-linecap="round" opacity="0.5"/>

    <!-- Middle arc (top-left to bottom-right, tighter) -->
    <path d="M -26,4 A 20,20 0 0,0 18,-2" fill="none" stroke="url(#accentGrad)" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>

    <!-- Inner arc (bottom-right to top-left, tightest) -->
    <path d="M 18,-2 A 13,13 0 0,0 -8,-4" fill="none" stroke="#a6e3a1" stroke-width="1.1" stroke-linecap="round" opacity="0.7"/>

    <!-- Innermost curl -->
    <path d="M -8,-4 A 7,7 0 0,0 6,-6" fill="none" stroke="#94e2d5" stroke-width="1" stroke-linecap="round" opacity="0.75"/>

    <!-- Center of spiral -->
    <circle cx="2" cy="-5" r="2.5" fill="#94e2d5" opacity="0.6"/>

    <!-- Escape arrow breaking upward from center -->
    <line x1="2" y1="-8" x2="2" y2="-36" stroke="url(#accentGrad)" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
    <!-- Arrowhead -->
    <path d="M -4,-28 L 2,-36 L 8,-28" fill="none" stroke="#a6e3a1" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>

    <!-- Energy particles along escape path -->
    <circle cx="2" cy="-40" r="1.5" fill="#a6e3a1" opacity="0.55"/>
    <circle cx="-2" cy="-44" r="1" fill="#94e2d5" opacity="0.4"/>
    <circle cx="6" cy="-42" r="0.8" fill="#a6e3a1" opacity="0.35"/>

    <!-- Spiral trail dots -->
    <circle cx="30" cy="8" r="1.3" fill="#94e2d5" opacity="0.4"/>
    <circle cx="-26" cy="4" r="1.2" fill="#a6e3a1" opacity="0.35"/>
    <circle cx="18" cy="-2" r="1.1" fill="#94e2d5" opacity="0.4"/>
    <circle cx="-8" cy="-4" r="1" fill="#a6e3a1" opacity="0.45"/>

    <!-- Outer flow particles -->
    <circle cx="24" cy="20" r="0.8" fill="#94e2d5" opacity="0.25"/>
    <circle cx="-20" cy="16" r="0.9" fill="#a6e3a1" opacity="0.2"/>
    <circle cx="32" cy="-8" r="0.7" fill="#94e2d5" opacity="0.2"/>
  </g>

  <!-- Typography -->
  <g transform="translate(200, 0)">
    <!-- Project Name -->
    <text x="0" y="92" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="62" font-weight="800" fill="url(#textGrad)" letter-spacing="3">WHIRLPOOL</text>

    <!-- Separator line -->
    <line x1="0" y1="108" x2="400" y2="108" stroke="url(#accentGrad)" stroke-width="0.8" opacity="0.4"/>

    <!-- Tagline -->
    <text x="0" y="132" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="11.5" fill="#cdd6f4" letter-spacing="2" opacity="0.85">PRIVESC REASONING ENGINE</text>

    <!-- Descriptor -->
    <text x="0" y="152" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="9" fill="#a6adc8" letter-spacing="2.5" opacity="0.6">PYTHON · LINPEAS · WINPEAS · PLAYBOOKS</text>
  </g>
</svg>