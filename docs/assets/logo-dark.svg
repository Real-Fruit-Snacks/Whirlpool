<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" fill="none">
  <defs>
    <!-- Primary gradient: teal to green -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#94e2d5"/>
      <stop offset="40%" stop-color="#94e2d5"/>
      <stop offset="100%" stop-color="#a6e3a1"/>
    </linearGradient>

    <!-- Accent gradient: green to teal -->
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a6e3a1"/>
      <stop offset="100%" stop-color="#94e2d5"/>
    </linearGradient>

    <!-- Icon gradient: vertical -->
    <linearGradient id="g3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#94e2d5"/>
      <stop offset="50%" stop-color="#94e2d5"/>
      <stop offset="100%" stop-color="#a6e3a1"/>
    </linearGradient>

    <!-- Faint outer glow -->
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#94e2d5" flood-opacity="0.15" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feComposite in="SourceGraphic" in2="shadow" operator="over"/>
    </filter>
  </defs>

  <!-- ===================== LOGOMARK ===================== -->
  <g transform="translate(58, 40)" filter="url(#softglow)">

    <!-- Hexagonal frame -->
    <path d="M 80 6 L 140 38 L 140 102 L 80 134 L 20 102 L 20 38 Z"
          fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.4"/>

    <!-- Inner hex subtle fill -->
    <path d="M 80 14 L 134 42 L 134 98 L 80 126 L 26 98 L 26 42 Z"
          fill="#94e2d5" opacity="0.04"/>

    <!-- === SPIRAL ESCAPE === -->

    <!-- Outer arc (bottom-right to top-left) -->
    <path d="M 110,78 A 28,28 0 0,0 54,74" fill="none" stroke="#94e2d5" stroke-width="1.3" stroke-linecap="round" opacity="0.5"/>

    <!-- Middle arc (top-left to bottom-right, tighter) -->
    <path d="M 54,74 A 20,20 0 0,0 98,68" fill="none" stroke="url(#g1)" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>

    <!-- Inner arc (bottom-right to top-left, tightest) -->
    <path d="M 98,68 A 13,13 0 0,0 72,66" fill="none" stroke="#a6e3a1" stroke-width="1.1" stroke-linecap="round" opacity="0.7"/>

    <!-- Innermost curl -->
    <path d="M 72,66 A 7,7 0 0,0 86,64" fill="none" stroke="#94e2d5" stroke-width="1" stroke-linecap="round" opacity="0.75"/>

    <!-- Center of spiral -->
    <circle cx="82" cy="65" r="2.5" fill="#94e2d5" opacity="0.6"/>

    <!-- Escape arrow breaking upward from center -->
    <line x1="82" y1="62" x2="82" y2="34" stroke="url(#g1)" stroke-width="1.8" stroke-linecap="round" opacity="0.8"/>
    <!-- Arrowhead -->
    <path d="M 76,42 L 82,34 L 88,42" fill="none" stroke="#a6e3a1" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>

    <!-- Energy particles along escape path -->
    <circle cx="82" cy="30" r="1.5" fill="#a6e3a1" opacity="0.55"/>
    <circle cx="78" cy="26" r="1" fill="#94e2d5" opacity="0.4"/>
    <circle cx="86" cy="28" r="0.8" fill="#a6e3a1" opacity="0.35"/>

    <!-- Spiral trail dots -->
    <circle cx="110" cy="78" r="1.3" fill="#94e2d5" opacity="0.4"/>
    <circle cx="54" cy="74" r="1.2" fill="#a6e3a1" opacity="0.35"/>
    <circle cx="98" cy="68" r="1.1" fill="#94e2d5" opacity="0.4"/>
    <circle cx="72" cy="66" r="1" fill="#a6e3a1" opacity="0.45"/>

    <!-- Outer flow particles -->
    <circle cx="104" cy="90" r="0.8" fill="#94e2d5" opacity="0.25"/>
    <circle cx="60" cy="86" r="0.9" fill="#a6e3a1" opacity="0.2"/>
    <circle cx="112" cy="62" r="0.7" fill="#94e2d5" opacity="0.2"/>

    <!-- Corner accents on hex -->
    <circle cx="80" cy="6" r="2" fill="#94e2d5" opacity="0.3"/>
    <circle cx="80" cy="134" r="2" fill="#a6e3a1" opacity="0.3"/>
  </g>

  <!-- ===================== TYPOGRAPHY ===================== -->

  <!-- "WHIRLPOOL" -->
  <text x="415" y="108"
        font-family="'SF Pro Display', 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="62" font-weight="800" letter-spacing="14"
        fill="url(#g1)" text-anchor="middle">WHIRLPOOL</text>

  <!-- Thin separator line -->
  <line x1="280" y1="128" x2="550" y2="128"
        stroke="url(#g1)" stroke-width="0.8" opacity="0.25"/>

  <!-- Tagline -->
  <text x="415" y="152"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace"
        font-size="11.5" font-weight="400" letter-spacing="5.5"
        fill="#7f849c" text-anchor="middle">PRIVESC REASONING ENGINE</text>

  <!-- Descriptor -->
  <text x="415" y="172"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace"
        font-size="9" font-weight="400" letter-spacing="3"
        fill="#585b70" text-anchor="middle">PYTHON  ·  LINPEAS  ·  WINPEAS  ·  PLAYBOOKS</text>
</svg>
