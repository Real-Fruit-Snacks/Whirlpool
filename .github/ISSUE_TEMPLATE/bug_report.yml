name: Bug Report
description: Report a bug in Whirlpool
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the information below to help us investigate.

  - type: input
    id: version
    attributes:
      label: Whirlpool Version
      description: "Output of `whirlpool --version` or the release tag"
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS / Platform
      description: "Operating system and architecture"
      placeholder: "Ubuntu 24.04 x86_64 / Windows 11 / macOS 15 ARM64"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      description: "Output of `python --version`"
      placeholder: "3.12.0"
    validations:
      required: true

  - type: dropdown
    id: input-type
    attributes:
      label: Input Type
      description: "What type of enumeration output were you analyzing?"
      options:
        - LinPEAS (.sh output)
        - WinPEAS (.exe output)
        - WinPEAS (.bat output)
        - Manual Linux commands
        - Manual Windows commands
        - Other / unknown
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: "Provide the exact steps to reproduce the bug"
      placeholder: |
        1. Run `whirlpool linpeas_output.txt --profile oscp`
        2. Observe error in output
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: "What did you expect to happen?"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: "What actually happened?"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Output
      description: "Paste any relevant logs, error messages, or terminal output"
      render: shell
    validations:
      required: false
